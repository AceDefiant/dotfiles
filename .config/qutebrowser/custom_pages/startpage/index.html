 <html>
 <head>
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="style.css" media="screen" />
	<script src="https://kit.fontawesome.com/f00c14539b.js" crossorigin="anonymous"></script>
	<title>Startpage</title>
 </head>
 <body>
	<div class="container">
		<div id="time" class="time"></div>
		
		<form method="GET" action="https://duckduckgo.com/">
			<input name="q" class="search-field" autofocus>
			<button type="submit" class="search-submit" value="" style="fill: white"></button>
		</form>
		
		<div class="box">
			<div class="box-container">
				<div class="heading">Entertainment</div>
				<a href="https://www.youtube.com/" target="_self">
					<div class="link" tabindex="1">Youtube</div>
				</a>
				<a href="https://www.pdfdrive.com/" target="_self">
					<div class="link" tabindex="2">Pdfdrive</div>
				</a>
				<a href="https://myanimelist.net/anime/season" target="_self">
					<div class="link" tabindex="3">MAL</div>
				</a>
			</div>
			<div class="box-container">
				<div class="heading">Coding</div>
				<a href="https://github.com/" target="_self">
					<div class="link" tabindex="5">Github</div>
				</a>
			</div>
		</div>
	</div>

	<script src="script.js"></script>
	
 </body>
 </html>
